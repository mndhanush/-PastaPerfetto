        [data-theme="dark"] {

            --bg-color: #050505;

            --text-muted: #D1D5DB;
            --card-bg: #121212;
            --border-color: #262626;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        /* Removed opacity: 0 and fade-in animations to ensure visibility */
        
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }

        .float-animation {
            animation: float 4s ease-in-out infinite;
        }

        /* Floating Nav Toggle Buttons */
        .nav-icon-btn {
            background-color: var(--card-bg); 
            color: var(--text-color);
            border-color: var(--border-color);
        }
        .nav-icon-btn:hover {
            border-color: #E09F3E;
            color: #E09F3E;
        }

        /* Custom Scrollbar */
        body::-webkit-scrollbar { width: 8px; }
        body::-webkit-scrollbar-track { background: transparent; }
        body::-webkit-scrollbar-thumb { background-color: #E09F3E; border-radius: 20px; }
        .dark body::-webkit-scrollbar-thumb { background-color: #9C6644; }
    </style>
</head>

        <button class="w-10 h-10 nav-icon-btn rounded-full flex items-center justify-center transition-all duration-300 shrink-0 border shadow-sm cursor-pointer" id="desktop-theme-toggle-btn" title="Toggle Dark/Light Mode">

            <p class="text-lg text-[var(--text-muted)] font-medium mb-10 max-w-md mx-auto leading-relaxed">
                Mamma mia! We can't seem to find the page you're looking for. It might have boiled over or drifted off the menu entirely.
            </p>

            <div class="flex flex-col sm:flex-row items-center justify-center gap-4">

                </a>
            </div>

            <div class="mt-16 pt-8 border-t border-[var(--border-color)] w-full max-w-lg mx-auto">

                <div class="flex flex-wrap items-center justify-center gap-4 sm:gap-8 text-sm font-bold">
                    <a href="menu.html" class="flex items-center gap-2 text-[var(--text-color)] hover:text-primary transition-colors group no-underline">
                        <span class="w-8 h-8 rounded-full bg-[var(--card-bg)] border border-[var(--border-color)] flex items-center justify-center group-hover:bg-primary group-hover:text-white group-hover:border-primary transition-all text-primary shadow-sm">

                    <a href="shop.html" class="flex items-center gap-2 text-[var(--text-color)] hover:text-primary transition-colors group no-underline">

    <div class="py-6 text-center text-xs text-[var(--text-muted)] font-medium">
        &copy; 2026 PastaPerfetto. All rights reserved.
    </div>

    <div class="absolute top-0 left-0 w-64 h-64 bg-primary/20 rounded-full blur-[100px] -translate-x-1/2 -translate-y-1/2 pointer-events-none z-0"></div>
    <div class="absolute bottom-0 right-0 w-96 h-96 bg-secondary/10 dark:bg-primary/5 rounded-full blur-[120px] translate-x-1/3 translate-y-1/3 pointer-events-none z-0"></div>

    <script>
        const htmlElement = document.documentElement;
        const desktopThemeToggleBtn = document.getElementById('desktop-theme-toggle-btn');
        const desktopRtlToggleBtn = document.getElementById('desktop-rtl-toggle-btn');

        // Initialize Theme
        const currentTheme = localStorage.getItem('theme') || 'light';
        htmlElement.setAttribute('data-theme', currentTheme);
        if (currentTheme === 'dark' || (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            htmlElement.classList.add('dark');
        }

        // Toggle Theme
        function toggleTheme() {
            htmlElement.classList.toggle('dark');
            const isDark = htmlElement.classList.contains('dark');
            const newTheme = isDark ? 'dark' : 'light';
            
            htmlElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
        }

        if (desktopThemeToggleBtn) {
            desktopThemeToggleBtn.addEventListener('click', toggleTheme);
        }

        // Initialize RTL
        const currentDir = localStorage.getItem('direction') || 'ltr';
        htmlElement.setAttribute('dir', currentDir);

        // Toggle RTL
        function toggleRTL() {
            const direction = htmlElement.getAttribute('dir') === 'rtl' ? 'ltr' : 'rtl';
            htmlElement.setAttribute('dir', direction);
            localStorage.setItem('direction', direction);
        }
        
        if (desktopRtlToggleBtn) {
            desktopRtlToggleBtn.addEventListener('click', toggleRTL);
        }
    </script>
</body>
</html>
